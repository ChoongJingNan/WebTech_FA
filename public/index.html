<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>QIU Lost & Found</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Campus Lost & Found System</h1>
    </header>

    <main>
        <section id="report-section"> 
            <h2>Submit a New Report</h2>
            <form id="report-form"> 
                <div class="form-section">
                    <h3>Your Information</h3>
                    <div class="input-group">
                        <label>Your Name <span class="required">*</span></label>
                        <input type="text" id="reporter_name" placeholder="e.g., Muhammad Ali" required>
                    </div>
                    <div class="input-group">
                        <label>Phone Number / Email <span class="required">*</span></label>
                        <input type="text" id="contact_info" placeholder="How can we reach you?" required>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Item Details</h3>
                    <div class="input-group">
                        <label>Item Name <span class="required">*</span></label>
                        <input type="text" id="title" placeholder="e.g., Headphones, Wallet" required>
                    </div>

                    <div class="input-group">
                        <label>Type of Report <span class="required">*</span></label>
                        <div class="category-toggle">
                            <input type="radio" id="lost" name="category" value="Lost" checked>
                            <label for="lost" class="toggle-btn">Lost</label>

                            <input type="radio" id="found" name="category" value="Found">
                            <label for="found" class="toggle-btn">Found</label>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Description <span class="required">*</span></label>
                        <textarea id="description" placeholder="Provide details like colour or shape." required></textarea>
                    </div>

                    <div class="input-group">
                        <label>Location <span class="required">*</span></label>
                        <input type="text" id="location" placeholder="Where was it last seen?" required>
                    </div>

                    <div class="input-group">
                        <label>Date <span class="required">*</span></label>
                        <input type="date" id="item_date" required>
                    </div>

                    <div class="input-group">
                        <label>Attach Image (Optional)</label>
                        <input type="file" id="item_image" accept="image/*">
                    </div>
                </div>

                <button type="submit">Submit Report</button>
            </form>
        </section>

        <section id="display-items">
            <h2>Recent Reports</h2>
            
            <div class="filter-section">
                
                <div class="filter-toggle">
                    <input type="radio" id="filter-all" name="display-filter" value="All" checked>
                    <label for="filter-all" class="filter-btn">All</label>

                    <input type="radio" id="filter-lost" name="display-filter" value="Lost">
                    <label for="filter-lost" class="filter-btn">Lost</label>

                    <input type="radio" id="filter-found" name="display-filter" value="Found">
                    <label for="filter-found" class="filter-btn">Found</label>
                </div>

                <div class="search-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#003366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search by name, item, description, location, or date...">
                </div>
                
            </div>

            <div id="itemsContainer"></div> 
        </section>
    </main>
</body>
</html>
