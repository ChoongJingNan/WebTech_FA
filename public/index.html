<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>QIU Lost & Found</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Campus Lost & Found System</h1>
    </header>

    <main>
        <section id="report-form">
            <h2>Submit a Report</h2>
            <form id="itemForm">
                <input type="text" id="title" placeholder="Item Title" required>
                <textarea id="description" placeholder="Description" required></textarea>
                <select id="category">
                    <option value="Lost">Lost</option>
                    <option value="Found">Found</option>
                </select>
                <input type="text" id="location" placeholder="Location" required>
                <input type="date" id="item_date" required>
                <input type="text" id="contact_info" placeholder="Your Contact Info" required>
                <button type="submit">Submit Report</button>
            </form>
        </section>

        <section id="display-items">
            <h2>Recent Reports</h2>
            <div id="itemsContainer"></div> </section>
    </main>
</body>
</html>
